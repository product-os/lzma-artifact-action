name: Flowzone

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches: [main, master]
  # allow external contributions to use secrets within trusted code
  pull_request_target:
    types: [opened, synchronize, closed]
    branches: [main, master]

jobs:
  flowzone:
    name: Flowzone
    uses: product-os/flowzone/.github/workflows/flowzone.yml@master
    # prevent duplicate workflow executions for pull_request and pull_request_target
    if: |
      (
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event_name == 'pull_request'
      ) || (
        github.event.pull_request.head.repo.full_name != github.repository &&
        github.event_name == 'pull_request_target'
      )
    secrets: inherit
    with:
      # Runs .github/actions/test once per value x os cell. encrypted/plain exercise the
      # AES-256 and compression-only paths; merge/split exercise the multi-artifact
      # extraction layouts. Linux only: 7z is guaranteed on ubuntu runners but not on macOS
      # (self-hosted Linux runners must have 7z / p7zip-full installed).
      custom_test_matrix: >
        {
          "value": ["encrypted", "plain", "merge", "split"],
          "os": ["ubuntu-latest", ["self-hosted", "Linux"]]
        }
