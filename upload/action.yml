name: LZMA Upload Artifact
description: Compress one or more files with LZMA (optionally AES-256 encrypted) into a single archive and upload it as a GitHub Actions artifact
author: balena

branding:
  icon: upload-cloud
  color: blue

inputs:
  source:
    description: A file, directory or wildcard pattern describing what to include in the artifact
    required: true
  base-directory:
    description: >
      Directory to run tar from, so both the source globs and the stored (and therefore
      extracted) paths are relative to it instead of the GitHub workspace. Use it to strip a
      leading path prefix from the archive: with base-directory set to build/out and source '.',
      an item at build/out/image.json is stored as image.json, not build/out/image.json.
      Empty (default) archives paths as given, relative to the workspace.
    required: false
    default: ""
  if-no-files-found:
    description: >
      What to do when source matches no existing files: error (fail, the default), warn (log a
      warning and upload nothing), or ignore (silently upload nothing). Individual globs or
      literal paths that match nothing are always tolerated — this only governs the case where
      the whole set is empty, matching actions/upload-artifact.
    required: false
    default: error
  follow-symlinks:
    description: >
      Whether to archive the target of a symlink rather than the symlink itself (tar
      --dereference). Default true, matching actions/upload-artifact's follow-symbolic-links, so
      symlinked sources (e.g. yocto deploy-dir manifests/images) are stored as real files. Set to
      false to preserve symlinks as-is.
    required: false
    default: "true"
  encrypt:
    description: >
      Whether to AES-256 encrypt the archive (including its headers/filenames). Set to true to
      encrypt, which requires a password. This is decoupled from password presence on purpose:
      a workflow can keep the password secret always set and toggle encryption on or off via
      this input without having to unset the secret or call the action conditionally.
    required: false
    default: "false"
  password:
    description: >
      Text password from which the AES-256 key is derived. Required when encrypt is true;
      ignored when encrypt is false.
    required: false
    default: ""
  compression-level:
    description: >
      LZMA compression level for 7-Zip, from 0 (store, no compression) to 9 (best).
      Levels above 4 raise runtime sharply for little size gain; use 0-1 for
      already-compressed or incompressible data.
    required: false
    default: "3"
  # --- actions/upload-artifact@v4 pass-throughs ---
  name:
    description: Name of the artifact in GitHub after upload
    required: false
    default: artifact
  retention-days:
    description: >
      Days until the artifact expires. 0 uses the repository default. Actual values range
      from 1 to 90 (public) or 400 (private).
    required: false
    default: "0"
  overwrite:
    description: >
      If true, an existing artifact with the same name is deleted before upload.
      If false, upload fails when a same-named artifact already exists.
    required: false
    default: "true"

outputs:
  artifact-id:
    description: ID of the uploaded artifact, usable with the GitHub REST API
    value: ${{ steps.upload.outputs.artifact-id }}
  artifact-url:
    description: URL to download the uploaded artifact
    value: ${{ steps.upload.outputs.artifact-url }}

runs:
  using: composite

  steps:
    - name: Create local artifact
      id: create
      shell: bash
      env:
        SOURCE: ${{ inputs.source }}
        BASE_DIR: ${{ inputs.base-directory }}
        IF_NONE: ${{ inputs.if-no-files-found }}
        FOLLOW_SYMLINKS: ${{ inputs.follow-symlinks }}
        ENCRYPT: ${{ inputs.encrypt }}
        PASSWORD: ${{ inputs.password }}
        LEVEL: ${{ inputs.compression-level }}
      run: |
        set -euo pipefail
        # cd into base-directory (if given) so globs expand and tar stores paths relative to it.
        if [ -n "$BASE_DIR" ]; then cd "$BASE_DIR"; fi
        # Collect the existing files from source, tolerating globs that match nothing and literal
        # paths that are absent (upload-artifact semantics: individual misses are fine). SOURCE is
        # unquoted on purpose so whitespace/newline-separated globs expand.
        files=()
        for entry in $SOURCE; do
          for f in $entry; do
            [ -e "$f" ] && files+=("$f")
          done
        done
        if [ "${#files[@]}" -eq 0 ]; then
          case "$IF_NONE" in
            ignore) echo "INFO: no files matched '${SOURCE}'; skipping upload"; echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0 ;;
            warn)   echo "::warning::no files matched '${SOURCE}'; skipping upload"; echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0 ;;
            *)      echo "::error::no files matched '${SOURCE}'"; exit 1 ;;
          esac
        fi
        echo "INFO: archiving ${#files[@]} path(s) with LZMA:"
        printf '  %s\n' "${files[@]}"
        # Build the blob in a fresh temp dir. 7z 'a' *adds to* an existing archive, so if this
        # action runs more than once in a job the hardcoded artifact.tar.7z would otherwise be
        # reused and the later upload would keep the earlier archive's contents. A temp dir also
        # keeps the blob out of the workspace (so a later source glob can't pick it up).
        # mktemp returns an absolute path, so it is unaffected by the base-directory cd above.
        blob="$(mktemp -d)/artifact.tar.7z"
        # 7-Zip has no long-option form; short switches:
        #   a        add to archive          -si  read tar stream from stdin
        #   -t7z     7z container (LZMA2)     -mx  LZMA level (0-9)
        #   -mhe=on  encrypt headers too      -p   password -> AES-256
        # Only the encryption switches vary, so build them into the arg list once.
        args=(a -si -t7z -mx="$LEVEL")
        if [ "$ENCRYPT" = "true" ]; then
          if [ -z "$PASSWORD" ]; then
            echo "::error::encrypt is true but no password was provided"
            exit 1
          fi
          echo "INFO: encrypting archive with AES-256"
          args+=(-mhe=on -p"$PASSWORD")
        fi
        # --dereference archives the target of a symlink rather than the link itself.
        tar_args=(--create --file=-)
        if [ "$FOLLOW_SYMLINKS" = "true" ]; then tar_args+=(--dereference); fi
        tar "${tar_args[@]}" "${files[@]}" | 7z "${args[@]}" "$blob"
        echo "INFO: local artifact created"
        ls -l "$blob"
        echo "LZMA_BLOB=$blob" >> "$GITHUB_ENV"

    - name: Upload local artifact
      id: upload
      if: steps.create.outputs.skip != 'true'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        path: ${{ env.LZMA_BLOB }}
        name: ${{ inputs.name }}
        if-no-files-found: error
        retention-days: ${{ inputs.retention-days }}
        # The blob is already LZMA-compressed; skip upload-artifact's own zip.
        compression-level: 0
        overwrite: ${{ inputs.overwrite }}
